name: Run Friden AI Bot

on:
  push:
    branches: [ main ]  # Запускать при каждом обновлении кода

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install aiogram python-dotenv

    - name: Run bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}  # Вот тут магия: берем тот секрет, что ты добавил!
      run: python main.py
